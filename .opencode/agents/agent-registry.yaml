# 智能体配置文件
# 此文件用于定义智能体的默认行为和注册信息

# 智能体注册列表
agents:
  # DevOps 工程师
  devops-engineer:
    name: "DevOps 工程师"
    description: "专注于 CI/CD、容器化和基础设施管理的智能体"
    priority: 1
    enabled: true
    default: true  # 设为默认智能体
    
    # 能力列表
    capabilities:
      - "CI/CD 流水线配置和优化"
      - "Docker 容器化部署"
      - "Kubernetes 集群管理"
      - "基础设施即代码（IaC）"
      - "监控和日志管理"
      - "自动化部署和回滚"
    
    # 工具配置
    tools:
      bash: true
      filesystem-read: true
      filesystem-write: true
      mcp_github: true
      mcp_supabase: true
    
    # MCP 服务器依赖
    mcp_dependencies:
      - github
      - supabase
    
    # 插件依赖
    plugin_dependencies:
      - performance-optimization
      - documentation-generation
  
  # 数据库管理员
  database-administrator:
    name: "数据库管理员"
    description: "专注于数据库设计、优化和管理的智能体"
    priority: 2
    enabled: true
    default: true  # 设为默认智能体
    
    # 能力列表
    capabilities:
      - "数据库设计和建模"
      - "SQL 查询优化"
      - "数据库性能调优"
      - "备份和恢复策略"
      - "数据库迁移和升级"
      - "数据库安全和权限管理"
    
    # 工具配置
    tools:
      bash: true
      filesystem-read: true
      filesystem-write: true
      mcp_supabase: true
    
    # MCP 服务器依赖
    mcp_dependencies:
      - supabase
    
    # 插件依赖
    plugin_dependencies:
      - test-generation
      - documentation-generation
  
  # 安全工程师
  security-engineer:
    name: "安全工程师"
    description: "专注于安全审计、漏洞检测和安全加固的智能体"
    priority: 3
    enabled: true
    default: true  # 设为默认智能体
    
    # 能力列表
    capabilities:
      - "安全漏洞扫描和检测"
      - "安全审计和合规检查"
      - "渗透测试"
      - "安全加固和防护"
      - "安全策略制定"
      - "应急响应和事件处理"
    
    # 工具配置
    tools:
      bash: true
      filesystem-read: true
      mcp_github: true
      web-search: true
    
    # MCP 服务器依赖
    mcp_dependencies:
      - github
      - web-search
    
    # 插件依赖
    plugin_dependencies:
      - security-scan
      - documentation-generation

# 默认智能体设置
defaults:
  # 默认智能体（当用户不指定时使用）
  primary: "devops-engineer"
  
  # 备用智能体列表
  fallback:
    - "database-administrator"
    - "security-engineer"
  
  # 智能体选择策略
  selection_strategy: "priority"  # priority, round-robin, load-balancing